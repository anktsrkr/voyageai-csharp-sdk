# ──────────────────────────────────────────────────────────────────────────────
# Publish stable NuGet packages.
#
#  Trigger : GitHub Release published (tag v<semver>)
#
#  Auth    : NuGet OIDC login (NuGet/login@v1) — no API keys required.
#             Requires a federated credential configured on your NuGet.org
#             account matching this repo + workflow. See:
#             https://learn.microsoft.com/en-us/nuget/nuget-org/github-actions
#
#  This workflow is triggered in two scenarios:
#    1. release-please creates a GitHub Release → release:published fires
#    2. Manual GitHub Release created for the initial v1.0.0
# ──────────────────────────────────────────────────────────────────────────────

name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write            # Issue OIDC token for NuGet/login@v1

jobs:
  publish-stable:
    runs-on: ubuntu-latest
    environment: nuget-stable       # GitHub Environment: requires human approval.
                                   # Restricted to release: published (i.e. v* tags).
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: stable-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore VoyageAI.Sdk.slnx

      - name: Build
        run: >
          dotnet build VoyageAI.Sdk.slnx
          --configuration Release
          -p:Version=${{ steps.stable-version.outputs.version }}

      - name: Test
        run: >
          dotnet test VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration"

      - name: Pack
        run: >
          dotnet pack VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.stable-version.outputs.version }}
          --output ./artifacts

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER || github.repository_owner }}

      - name: Publish to NuGet.org (stable)
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
