# ──────────────────────────────────────────────────────────────────────────────
# Trunk-based CD pipeline with release-please.
#
#  Trigger : push to main  |  workflow_dispatch (manual publish of existing tag)
#
#  Flow    : 1. release-please analyses conventional commits on main
#            2. Either opens a draft Release PR (version bump + changelog)
#               or creates a GitHub Release with tag v<semver>
#            3. If no release was created  → prerelease job publishes
#               X.Y.(Z+1)-pre.<sha> to NuGet.org (patch-bumped so it
#               sorts above current stable; see prerelease-version step)
#            4. If a release WAS created   → publish-stable job (below)
#               builds/tests/packs/pushes v<semver> to NuGet.org.
#            5. workflow_dispatch          → publish-stable job resolves the
#               latest release tag and publishes it. Used once for the bootstrap
#               v1.0.0 (which release-please already created on initial push).
#
#  Why publish lives here, not in publish.yml:
#    GitHub deliberately suppresses events raised by the default GITHUB_TOKEN
#    to prevent recursive workflows. release-please creates releases using
#    GITHUB_TOKEN, so a `release: published` trigger in a separate workflow
#    would never fire. Keeping the publish step in this workflow, gated on the
#    release-please job's output, sidesteps the suppression entirely.
#
#  Auth    : NuGet OIDC login (NuGet/login@v1) — no API keys required.
#             Requires a federated credential configured on your NuGet.org
#             account matching this repo + workflow. See:
#             https://learn.microsoft.com/en-us/nuget/nuget-org/github-actions
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - samples/**
  workflow_dispatch:        # Allows manually publishing an existing release tag
                             # (e.g. bootstrap v1.0.0 that release-please already created).

permissions:
  contents: write
  pull-requests: write
  id-token: write          # Required for NuGet/login@v1 to mint OIDC token

jobs:
  # ── release-please orchestrator ────────────────────────────────────────────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Prerelease channel ─────────────────────────────────────────────────────
  # Publishes a prerelease NuGet package on every main push where release-please
  # did NOT create a stable release. Version format: <manifest-version>-pre.<sha>
  prerelease:
    needs: release-please
    if: github.event_name == 'push' && needs.release-please.outputs.releases_created == 'false'
    runs-on: ubuntu-latest
    environment: nuget-prerelease   # GitHub Environment: no protection rules,
                                   # auto-publishes on every push to main.
    permissions:
      contents: read
      id-token: write            # Issue OIDC token for NuGet/login@v1
    steps:
      - uses: actions/checkout@v4

      - name: Determine prerelease version
        id: prerelease-version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          if [ "$VERSION" = "0.0.0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Bootstrap state (0.0.0) — skipping prerelease to keep feed clean."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          # Bump patch so the prerelease sorts ABOVE current stable (SemVer):
          #   1.0.0 -> 1.0.1-pre.<sha>  (> 1.0.0, < 1.0.1/1.1.0/2.0.0)
          # Otherwise "1.0.0-pre.<sha>" sorts BELOW 1.0.0 and NuGet treats it
          # as a downgrade from stable.
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          PRE_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-pre.${GITHUB_SHA:0:7}"
          echo "version=${PRE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        if: steps.prerelease-version.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        if: steps.prerelease-version.outputs.skip != 'true'
        run: dotnet restore VoyageAI.Sdk.slnx

      - name: Build
        if: steps.prerelease-version.outputs.skip != 'true'
        run: >
          dotnet build VoyageAI.Sdk.slnx
          --configuration Release
          -p:Version=${{ steps.prerelease-version.outputs.version }}

      - name: Test
        if: steps.prerelease-version.outputs.skip != 'true'
        run: >
          dotnet test VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration"

      - name: Pack
        if: steps.prerelease-version.outputs.skip != 'true'
        run: >
          dotnet pack VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          -p:Version=${{ steps.prerelease-version.outputs.version }}
          -p:PackageVersion=${{ steps.prerelease-version.outputs.version }}
          --output ./artifacts

      - name: NuGet login
        if: steps.prerelease-version.outputs.skip != 'true'
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER || github.repository_owner }}

      - name: Publish to NuGet.org (prerelease)
        if: steps.prerelease-version.outputs.skip != 'true'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # ── Stable release channel ─────────────────────────────────────────────────
  # Publishes stable packages when release-please creates a release, OR when
  # triggered manually via workflow_dispatch (e.g. to publish the bootstrap
  # v1.0.0 release that release-please already created on the initial push).
  #
  # NOTE: This job lives in release-please.yml (not a separate publish.yml)
  # because events raised by the default GITHUB_TOKEN are deliberately
  # suppressed by GitHub to prevent recursive workflows. A release:published
  # trigger from a separate workflow would never fire — release-please creates
  # releases using GITHUB_TOKEN. Running the publish step here, gated on the
  # release-please job's output, avoids the cross-workflow event entirely.
  publish-stable:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: nuget-stable       # GitHub Environment: requires human approval.
    permissions:
      contents: read
      id-token: write            # Issue OIDC token for NuGet/login@v1
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: stable-version
        run: |
          # On workflow_dispatch, read the version from the latest release tag
          # (release-please may not have created one in this run). On a normal
          # push where release-please created a release, use its tag.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="${{ needs.release-please.outputs.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore VoyageAI.Sdk.slnx

      - name: Build
        run: >
          dotnet build VoyageAI.Sdk.slnx
          --configuration Release
          -p:Version=${{ steps.stable-version.outputs.version }}

      - name: Test
        run: >
          dotnet test VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration"

      - name: Pack
        run: >
          dotnet pack VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.stable-version.outputs.version }}
          --output ./artifacts

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER || github.repository_owner }}

      - name: Publish to NuGet.org (stable)
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
