name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / net${{ matrix.tf }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        tf: ['8.0', '10.0']
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ matrix.tf == '10.0' && '10.0.x' || '8.0.x' }}

      - name: Restore dependencies
        run: dotnet restore VoyageAI.Sdk.slnx

      - name: Build
        run: dotnet build VoyageAI.Sdk.slnx --configuration Release -p:TreatWarningsAsErrors=true

      - name: Run unit tests
        run: >-
          dotnet test VoyageAI.Sdk.slnx
          --configuration Release
          --no-build
          --framework net${{ matrix.tf }}
          --filter "Category!=Integration"
          -p:CollectCoverage=true
          -p:CoverletOutputFormat=cobertura
          -p:CoverletOutput=./coverage/
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-net${{ matrix.tf }}
          path: '**/*.trx'

  # ── Validate NuGet pack (dry-run) ──────────────────────────────────────────
  pack-validation:
    name: Validate NuGet Pack
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Pack (dry-run validation)
        run: >-
          dotnet pack VoyageAI.Sdk.slnx
          --configuration Release
          --output ./artifacts

      - name: List packages
        run: ls -la ./artifacts/
